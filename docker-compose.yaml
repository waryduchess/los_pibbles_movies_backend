services:
  mysql:
    image: mysql:8.1
    container_name: mi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: los_pibbles_movies
      MYSQL_DATABASE: mi_aplicacion
      MYSQL_USER: admin
      MYSQL_PASSWORD: los_pibbles_movies
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -plos_pibbles_movies"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: mi_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: admin
      PMA_PASSWORD: los_pibbles_movies
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: